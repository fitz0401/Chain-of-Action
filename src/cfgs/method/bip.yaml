# @package _global_
#
# BIP — Bidirectional Policy (segment + motion-planning hand-off).
#
# Offline: split demos by GRIPPER-ONLY keyframes; per segment-index, normalize each
# segment into the keyframe SE(3) frame and find the near-goal low-variance interval
# (variance < variance_threshold, floored at min_interval_length). Mark variance_start.
#
# Train (both heads only on the interval [variance_start, keyframe], shared encoder):
#   CoA-REVERSE planner : predicts keyframe -> max(obs_idx, variance_start).
#   DP-FORWARD control  : plain DP, image-conditioned, masked to in-interval samples.
#
# Inference: CoA -> segment start; motion-plan to it (RLBench planner); switch to DP.

method_name: bip
action_sequence: variable     # resolved at runtime to max CoA target length (interval)
num_train_steps: 20000

method:
  _target_: src.methods.bip.BIP

  # ── segmentation / variance interval (offline) ──
  gripper_only_keyframe: true    # keyframes from gripper state changes only (no velocity-0)
  min_interval_length: 20        # interval floor (default = DP chunk length)
  # SE(3)-aligned position variance (m^2, sum of 3 axes) cut-off — THE knob that sets
  # how much of the near-goal segment is "low variance". Smaller -> shorter interval.
  # Calibrate against the "[BIP] ... interval_len per seg-index=..." line printed at load.
  variance_threshold: 0.002

  # ── DP controller ──
  dp_action_sequence: 20         # executed forward chunk length (divisible by 4)
  dp_sample_inside_prob: 0.5     # P(sample obs inside the interval) for DP supervision
  action_dim: 8
  hidden_dim: 512
  num_diffusion_iters: 50

  # ── inference hand-off ──
  plan_reach_threshold: 0.05     # normalized EE distance to switch plan -> DP
  pad_eps: 0.3                   # ||action|| below this is padding (segment-start detect)

  # ── optimiser ──
  lr: 1e-4
  lr_backbone: 1e-5
  weight_decay: 1e-4
  num_train_steps: ${num_train_steps}
  adaptive_lr: true
  actor_grad_clip: 1.0

  # ── CoA losses ──
  loss_type: l1
  latent_loss_type: l1
  execute_threshold: 0.01
  execution_length: ${execution_length}

  # ── fields consumed by dataset / env factory ──
  action_order: REVERSE
  action_padding: zero
  mtp: false
  keyframe_only: false
  full_traj_training: false
  action_mode: ${env.action_mode}
  use_lang_cond: false

  # ── shared image encoder (CoA spatial encoder) ──
  encoder_model:
    _target_: src.methods.coa.coa.ImageEncoder
    _partial_: true
    input_shape: [4, 3, 128, 128]
    hidden_dim: ${method.hidden_dim}
    position_embedding: "sine"
    lr_backbone: ${method.lr_backbone}
    masks: false
    backbone: "resnet18"
    dilation: false
    use_frozen_bn: true
    use_lang_cond: false

  # ── CoA planner actor (REVERSE) ──
  coa_actor_model:
    _target_: src.methods.coa.coa.ActorModel
    _partial_: true
    num_queries: ${action_sequence}
    hidden_dim: ${method.hidden_dim}
    enc_layers: 4
    dec_layers: 6
    dim_feedforward: 3200
    dropout: 0.1
    nheads: 8
    nmtpheads: 0
    pre_norm: true
    state_dim: 8
    action_dim: ${method.action_dim}
    use_lang_cond: false

  # ── DP controller UNet ──
  dp_actor_model:
    _target_: src.models.diffusion_models.ConditionalUnet1D
    _partial_: true
    sequence_length: ${method.dp_action_sequence}
    diffusion_step_embed_dim: 256
    down_dims: [256, 512, 1024]
    kernel_size: 5
    n_groups: 8
