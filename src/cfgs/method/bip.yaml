# @package _global_
#
# BIP — Bidirectional Policy (stop_head redesign).
#
# Offline: split demos by GRIPPER-ONLY keyframes; per segment-index, compute the
# cross-demo SE(3)-normalised variance curve σ²(k) and auto-detect its inflection
# point (2nd-order difference peak, or PELT if ruptures is installed) → stop_k.
# No manual threshold — the inflection is data-driven.
#
# Train (full segment, shared encoder):
#   CoA-REVERSE planner : full segment [keyframe → start] as reverse target.
#   stop_head           : Linear(action_dim → 1), BCE on positions 0 … stop_k.
#   Loss = L_action(L1) + L_latent(L1) + λ_stop · L_stop(BCE)
#
# Inference (closed-loop, re-plan every step):
#   CoA reverse AR → stop_head sigmoid → first p > stop_threshold → execute → re-plan.

method_name: bip
action_sequence: variable     # resolved at runtime to max segment length
num_train_steps: 20000

method:
  _target_: src.methods.bip.BIP

  # ── stop_head ──
  lambda_stop: 1.0            # weight of BCE stop loss
  stop_threshold: 0.5         # sigmoid cut-off for inference stop detection
  plan_reach_threshold: 0.05  # normalised EE dist: far→motion-plan to start, close→fwd chunk
  chunk_size: 4               # actions returned per act() call (action chunking)

  # ── action / model dims ──
  action_dim: 8
  hidden_dim: 512
  execution_length: ${execution_length}

  # ── optimiser ──
  lr: 1e-4
  lr_backbone: 1e-5
  weight_decay: 1e-4
  num_train_steps: ${num_train_steps}
  adaptive_lr: true
  actor_grad_clip: 1.0

  # ── CoA losses ──
  loss_type: l1
  latent_loss_type: l1

  # ── fields consumed by dataset / env factory ──
  action_order: REVERSE
  action_padding: zero
  mtp: false
  keyframe_only: false
  full_traj_training: false
  action_mode: ${env.action_mode}
  use_lang_cond: false
  gripper_only_keyframe: true  # keyframes from gripper state changes only

  # ── shared image encoder (CoA spatial encoder) ──
  encoder_model:
    _target_: src.methods.coa.coa.ImageEncoder
    _partial_: true
    input_shape: [4, 3, 128, 128]
    hidden_dim: ${method.hidden_dim}
    position_embedding: "sine"
    lr_backbone: ${method.lr_backbone}
    masks: false
    backbone: "resnet18"
    dilation: false
    use_frozen_bn: true
    use_lang_cond: false

  # ── CoA REVERSE planner ──
  coa_actor_model:
    _target_: src.methods.coa.coa.ActorModel
    _partial_: true
    num_queries: ${action_sequence}
    hidden_dim: ${method.hidden_dim}
    enc_layers: 4
    dec_layers: 6
    dim_feedforward: 3200
    dropout: 0.1
    nheads: 8
    nmtpheads: 0
    pre_norm: true
    state_dim: 8
    action_dim: ${method.action_dim}
    use_lang_cond: false
